      - data:
          code: |-
            import re

            def main(text: str) -> dict:
                try:
                    pattern = r"\[.*?\]"
                    match = re.search(pattern, text)
                    if match:
                        tag = match.group(0)
                        tag = re.sub(r'\s*:\s*', ':', tag)
                        clean_text = re.sub(pattern, "", text).strip()
                        print(f"[LOG] Found tag: {tag}")
                    else:
                        tag = ""
                        clean_text = text.strip()
                        print("[LOG] No tag found, fallback to empty")
                    return {
                        "tag": tag,
                        "clean_text": clean_text
                    }
                except Exception as e:
                    print(f"[ERROR] Exception in Code Node: {str(e)}")
                    return {
                        "tag": "",
                        "clean_text": text.strip()
                    }
          code_language: python3
          outputs:
            clean_text:
              children: null
              type: string
            tag:
              children: null
              type: string
          selected: false
