      - data:
          code: >-
            import re


            def main(text: str) -> dict:
                pattern = r'\[\s*(รอข้อมูล|ส่งฟอร์ม|จบการสนทนา|ติดต่อแอดมิน|สถานะ\s*:\s*(?:บัญชี|นิติ|รัฐประศาสนศาสตร์|ป\.โท|ป\.เอก|ป\.บัณฑิต))\s*\]'

                match = re.search(pattern, text)
                if match:
                    tag = re.sub(r'\s+', '', match.group(1))
                else:
                    tag = "ไม่มีแท็ก"

                clean_text = re.sub(pattern, '', text).strip()

                return {
                    "tag": tag,
                    "clean_text": clean_text
                }
