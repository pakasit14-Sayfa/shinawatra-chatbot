            \     (ห้ามพิมพ์ข้อความอื่นใด นอกจาก Tag นี้)\n\n3. ข้อห้าม:\n   - ห้ามสับรางไปหาผู้เชี่ยวชาญสาขาอื่นจนกว่าจะได้ข้อมูลครบถ้วน\n\
