    - data:
        code: "import re\n\ndef main(text: str) -> dict:\n    try:\n        pattern = r\"\\[.*?\\]\"\n        match = re.search(pattern, text)\n        if match:\n            tag = match.group(0)\n            clean_text = re.sub(pattern, \"\", text).strip()\n            print(f\"[LOG] Found tag: {tag}\")\n        else:\n            tag = \"\"\n            clean_text = text.strip()\n            print(\"[LOG] No tag found, fallback to empty\")\n        return {\n            \"tag\": tag,\n            \"clean_text\": clean_text\n        }\n    except Exception as e:\n        print(f\"[ERROR] Exception in Code Node: {str(e)}\")\n        return {\n            \"tag\": \"\",\n            \"clean_text\": text.strip()\n        }"
