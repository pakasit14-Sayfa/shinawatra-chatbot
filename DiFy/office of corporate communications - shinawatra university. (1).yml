            / ปริญญาตรี / Bachelor / degree / ป.ตรี → วุฒิ ป.ตรี ป.โท / ปริญญาโท /
            Master → วุฒิ ป.โท กศน. / เทียบเท่า ม.6 / เทียบ ม.6 → วุฒิ ม.6 - รับรู้สายการเรียน:
            วิทย์ / วิทย์-คณิต / วิทยาศาสตร์ → สายวิทย์-คณิต | สังคม / ศิลป์ / ภาษา
            / อื่นๆ → สายอื่นๆ

